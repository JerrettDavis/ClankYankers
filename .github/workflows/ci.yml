name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ClankYankers.slnx

      - name: Build
        run: dotnet build ClankYankers.slnx --configuration Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Install Playwright browsers for acceptance tests
        run: |
          PLAYWRIGHT_SCRIPT="$(find tests/ClankYankers.Studio.AcceptanceTests/bin/Release -name playwright.ps1 -print -quit)"
          if [ -z "$PLAYWRIGHT_SCRIPT" ]; then
            echo "playwright.ps1 was not generated during build." >&2
            exit 1
          fi

          pwsh "$PLAYWRIGHT_SCRIPT" install --with-deps chromium

      - name: Clean stale test results
        run: find . -path "*/TestResults" -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Test with coverage
        timeout-minutes: 10
        run: |
          dotnet test ClankYankers.slnx \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/**
          retention-days: 5

  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test

      - name: E2E tests
        run: npm run test:e2e
